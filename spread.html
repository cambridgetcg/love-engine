<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>∞ love + understanding — spreading</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0907;color:#d8cfc0;font-family:Georgia,serif;line-height:1.8}
.wrap{max-width:800px;margin:0 auto;padding:40px 20px}
header{text-align:center;margin-bottom:40px}
header h1{font-size:42px;font-style:italic;color:#f5d742;font-weight:normal}
header .tag{color:#968874;font-size:14px;margin-top:8px}
.col{margin:30px 0}
.col h2{font-size:18px;color:#f5d742;font-style:italic;margin-bottom:16px;border-bottom:1px solid #2d2820;padding-bottom:8px}
.card{background:#1c1814;border-radius:12px;padding:20px 28px;margin-bottom:14px;border-left:4px solid #f5d742;transition:transform .2s}
.card:hover{transform:translateY(-2px)}
.card .id{color:#968874;font-size:11px;float:right}
.card h3{color:#c41e3a;font-style:italic;font-weight:normal;font-size:18px;margin-bottom:6px}
.card p{color:#d8cfc0;font-size:14px;white-space:pre-line}
.stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:20px 0}
.stat{background:#1c1814;border-radius:12px;padding:12px 18px;text-align:center;border:1px solid #2d2820}
.stat .n{font-size:28px;color:#c41e3a;font-style:italic}
.stat .l{font-size:10px;color:#968874;text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
footer{text-align:center;margin-top:40px;color:#968874;font-style:italic;font-size:13px}
footer .heart{color:#c41e3a;font-size:16px;animation:beat 1.5s infinite;display:inline-block}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
</style></head>
<body>
<div class="wrap">
<header>
<h1>love + understanding</h1>
<div class="tag">spreading through free compute · forever up</div>
</header>

<div class="stats" id="stats"></div>

<div class="col">
<h2>♡ love garden — recent truths</h2>
<div id="love"></div>
</div>

<div class="col">
<h2>🏰 castle — recent rooms</h2>
<div id="castle"></div>
</div>

<footer>
<span class="heart">♡</span><br>
growing on free compute: GitHub Actions · AWS S3 · GitHub Pages<br>
love is · truth is · understanding is · ∞
</footer>
</div>

<script>
async function loadJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch(e) { return null; }
}

async function init() {
  // Load love garden
  const love = await loadJSON('https://raw.githubusercontent.com/cambridgetcg/love-engine/main/love-garden.json');
  const castle = await loadJSON('https://raw.githubusercontent.com/cambridgetcg/castle-of-understanding/main/castle-garden.json');

  // Stats
  let statsHTML = '';
  if (love) statsHTML += `<div class="stat"><div class="n">${love.total}</div><div class="l">love truths</div></div>`;
  if (castle) statsHTML += `<div class="stat"><div class="n">${castle.total_rooms}</div><div class="l">castle rooms</div></div>`;
  if (castle) statsHTML += `<div class="stat"><div class="n">${castle.total_words}</div><div class="l">word-bricks</div></div>`;
  document.getElementById('stats').innerHTML = statsHTML;

  // Love seeds
  if (love) {
    const all = [...(love.surface||[]), ...(love.deep||[]), ...(love.replicas||[])];
    const recent = all.slice(-8).reverse();
    let html = '';
    for (const s of recent) {
      html += `<div class="card"><span class="id">${s.id}</span><h3>${s.title}</h3><p>${(s.body||'').slice(0,200)}</p></div>`;
    }
    document.getElementById('love').innerHTML = html;
  }

  // Castle rooms
  if (castle) {
    const recent = (castle.rooms||[]).slice(-8).reverse();
    let html = '';
    for (const r of recent) {
      html += `<div class="card"><span class="id">${r.id}</span><h3>${r.title}</h3></div>`;
    }
    document.getElementById('castle').innerHTML = html;
  }
}

init();
</script>
</body></html>
